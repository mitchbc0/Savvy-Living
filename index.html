<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SavvyLiving Finance Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --text: #1a1a1a;
    --text-secondary: #6b6b67;
    --border: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --up: #1D9E75;
    --down: #E24B4A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #262623;
      --text: #f0ede8;
      --text-secondary: #888780;
      --border: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.2);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-secondary); color: var(--text); min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
  .nav { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .nav-btn { padding: 8px 18px; border-radius: var(--radius-md); border: 0.5px solid var(--border-secondary); background: transparent; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all 0.15s; }
  .nav-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px; }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 20px; font-weight: 500; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  input[type=text], input[type=number] {
    padding: 8px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-secondary);
    background: var(--bg); color: var(--text); font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--text); }
  .btn { padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border-secondary); background: transparent; cursor: pointer; font-size: 13px; color: var(--text); transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ai { background: #533AB7; color: #fff; border-color: #533AB7; }
  .btn-ai:hover { opacity: 0.85; background: #533AB7; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: var(--radius-md); font-weight: 500; display: inline-block; }
  .badge.up { background: #E1F5EE; color: #0F6E56; }
  .badge.down { background: #FCEBEB; color: #A32D2D; }
  .holding-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .holding-top { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr auto; gap: 8px; align-items: center; }
  .ticker-sym { font-size: 15px; font-weight: 500; }
  .remove-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 18px; line-height: 1; }
  .remove-btn:hover { color: var(--down); }
  .indicator-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .ind-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 8px 10px; }
  .ind-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); margin-bottom: 2px; }
  .ind-val { font-size: 14px; font-weight: 500; }
  .news-item { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .news-item:last-child { border-bottom: none; }
  .news-headline a { font-size: 13px; color: var(--text); text-decoration: none; line-height: 1.5; }
  .news-headline a:hover { text-decoration: underline; }
  .news-meta { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
  .divider { height: 0.5px; background: var(--border); margin: 12px 0; }
  .alloc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .alloc-label { font-size: 13px; color: var(--text-secondary); width: 150px; flex-shrink: 0; }
  .alloc-bar-wrap { flex: 1; height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
  .alloc-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .alloc-amt { font-size: 13px; font-weight: 500; width: 80px; text-align: right; flex-shrink: 0; }
  .alloc-pct { font-size: 12px; color: var(--text-secondary); width: 35px; text-align: right; flex-shrink: 0; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .slider-row label { font-size: 13px; width: 150px; flex-shrink: 0; color: var(--text-secondary); }
  .slider-row input[type=range] { flex: 1; }
  .slider-row .pct-out { font-size: 13px; font-weight: 500; width: 40px; text-align: right; flex-shrink: 0; }
  .section-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  .loading { font-size: 13px; color: var(--text-secondary); padding: 12px 0; }
  .error-msg { font-size: 12px; color: var(--down); padding: 4px 0 8px; min-height: 20px; }
  .api-note { font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
  .ai-box { margin-top: 12px; background: #EEEDFE; border-radius: var(--radius-md); padding: 12px 14px; }
  .ai-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #3C3489; font-weight: 500; margin-bottom: 6px; }
  .ai-box-text { font-size: 13px; color: #26215C; line-height: 1.65; }
  @media (prefers-color-scheme: dark) {
    .ai-box { background: #26215C; }
    .ai-box-label { color: #AFA9EC; }
    .ai-box-text { color: #CECBF6; }
  }
  @media (max-width: 560px) {
    .holding-top { grid-template-columns: 1fr 1fr; gap: 10px; }
    .holding-top > *:nth-child(3), .holding-top > *:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>SavvyLiving</h1>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('holdings', this)">Holdings</button>
    <button class="nav-btn" onclick="showTab('watchlist', this)">Watchlist</button>
    <button class="nav-btn" onclick="showTab('paycheck', this)">Paycheck</button>
  </div>

  <div id="holdings" class="section active">
    <p class="section-title">Portfolio holdings</p>
    <div class="row">
      <input type="text" id="h-ticker" placeholder="Ticker (e.g. AAPL)" style="width:140px;" />
      <input type="number" id="h-shares" placeholder="Shares" style="width:100px;" min="0" step="any" />
      <input type="number" id="h-cost" placeholder="Avg cost $" style="width:110px;" min="0" step="any" />
      <button class="btn btn-primary" onclick="addHolding()">Add</button>
    </div>
    <div id="h-error" class="error-msg"></div>
    <div id="holdings-list"></div>
    <div id="portfolio-summary"></div>
    <p class="api-note">Prices pulled live from Finnhub.</p>
  </div>

  <div id="watchlist" class="section">
    <p class="section-title">Watchlist</p>
    <div class="row">
      <input type="text" id="w-ticker" placeholder="Ticker (e.g. NVDA)" style="width:160px;" />
      <button class="btn btn-primary" onclick="addToWatchlist()">Add</button>
    </div>
    <div id="w-error" class="error-msg"></div>
    <div id="watchlist-list"></div>
  </div>

  <div id="paycheck" class="section">
    <p class="section-title">Paycheck allocator</p>
    <div class="row" style="margin-bottom:16px;">
      <label style="font-size:13px;color:var(--text-secondary);width:120px;flex-shrink:0;">Take-home pay</label>
      <input type="number" id="paycheck-amt" placeholder="e.g. 3000" style="width:160px;" oninput="updateAlloc()" />
    </div>
    <div id="alloc-sliders"></div>
    <div class="divider"></div>
    <div id="alloc-bars"></div>
    <div id="alloc-remaining"></div>
  </div>
</div>

<script type="module">
import { GoogleGenerativeAI } from 'https://esm.sh/@google/generative-ai@0.21.0';

// ── REPLACE THESE WITH YOUR ACTUAL API KEYS ──
const FINNHUB_KEY = 'd6rerkhr01qr194me1rgd6rerkhr01qr194me1s0';
const GEMINI_KEY  = 'AIzaSyAL7jKorz4fq_nwBGaoRmZMFfYdLeHc7GU';
// ─────────────────────────────────────────────

const ALLOC_CATS = [
  { label: 'Rent / Housing',       color: '#378ADD', pct: 30 },
  { label: 'Groceries',            color: '#1D9E75', pct: 10 },
  { label: 'Roth IRA / Investing', color: '#533AB7', pct: 20 },
  { label: 'Student Loans',        color: '#E24B4A', pct: 15 },
  { label: 'Savings',              color: '#EF9F27', pct: 10 },
  { label: 'Discretionary',        color: '#D4537E', pct: 10 },
];

let holdings  = JSON.parse(localStorage.getItem('savvy_holdings')  || '[]');
let watchlist = JSON.parse(localStorage.getItem('savvy_watchlist') || '[]');
let allocPcts = ALLOC_CATS.map(c => c.pct);

function save() {
  localStorage.setItem('savvy_holdings',  JSON.stringify(holdings));
  localStorage.setItem('savvy_watchlist', JSON.stringify(watchlist));
}

window.showTab = function(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  btn.classList.add('active');
}

async function finnhub(path) {
  const r = await fetch(`https://finnhub.io/api/v1/${path}&token=${FINNHUB_KEY}`);
  if (!r.ok) throw new Error('Finnhub error');
  return r.json();
}

function fetchQuote(t)   { return finnhub(`quote?symbol=${t}`); }
function fetchMetrics(t) { return finnhub(`stock/metric?symbol=${t}&metric=all`); }
function fetchNews(t) {
  const to   = new Date().toISOString().split('T')[0];
  const from = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
  return finnhub(`company-news?symbol=${t}&from=${from}&to=${to}`);
}

function fmt(n, dec=2)  { return (n == null || isNaN(n)) ? '—' : Number(n).toFixed(dec); }
function fmtPct(n)      { if (n == null || isNaN(n)) return '—'; return (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%'; }
function fmtMoney(n)    { if (n == null || isNaN(n) || n === 0) return '—'; return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

// ── GEMINI AI ──
async function loadAI(ticker, avgCost) {
  const el = document.getElementById('ai-' + ticker);
  if (GEMINI_KEY === 'YOUR_GEMINI_KEY') {
    el.innerHTML = '<div class="ai-box"><div class="ai-box-label">AI analysis</div><div class="ai-box-text">Add your Gemini API key to enable AI analysis.</div></div>';
    return;
  }
  el.innerHTML = '<p class="loading" style="margin-top:10px">Generating AI analysis...</p>';
  try {
    const [quote, metrics, news] = await Promise.all([
      fetchQuote(ticker), fetchMetrics(ticker), fetchNews(ticker)
    ]);
    const m = metrics.metric || {};
    const headlines = (news || []).slice(0,5).map(n => '- ' + n.headline).join('\n') || 'No recent news.';
    const avgLine = avgCost ? `\nInvestor avg cost: $${avgCost} (stock is currently ${quote.c > avgCost ? 'above' : 'below'} avg cost)` : '';

    const prompt = `You are a concise financial analyst. Given the following data for ${ticker}, write a 4-5 sentence plain-English analysis covering: what's driving the price today, what the key indicators suggest about valuation, and whether short-term momentum looks bullish or bearish.${avgCost ? ' Also note how current price compares to the investor avg cost.' : ''} Be direct, no fluff, no disclaimers.

Current price: $${quote.c}
Day change: ${(quote.dp||0).toFixed(2)}%
Day high: $${quote.h} | Day low: $${quote.l}
Previous close: $${quote.pc}${avgLine}
PE (TTM): ${m.peNormalizedAnnual ?? 'N/A'}
Forward PE: ${m.forwardPE ?? 'N/A'}
EPS (TTM): ${m.epsTTM ?? 'N/A'}
52W High: $${m['52WeekHigh'] ?? 'N/A'} | 52W Low: $${m['52WeekLow'] ?? 'N/A'}
Market Cap: $${m.marketCapitalization ? (m.marketCapitalization/1000).toFixed(1)+'B' : 'N/A'}

Recent headlines:
${headlines}`;

    const genAI = new GoogleGenerativeAI(GEMINI_KEY);
    const model = genAI.getGenerativeModel({ model: 'gemini-2.0-flash-lite' });
    const result = await model.generateContent(prompt);
    const text = result.response.text();

    el.innerHTML = `<div class="ai-box">
      <div class="ai-box-label">AI analysis · ${ticker}</div>
      <div class="ai-box-text">${text.replace(/\n/g,'<br>')}</div>
    </div>`;
  } catch(e) {
    console.error('Gemini error:', e);
    el.innerHTML = `<div class="ai-box"><div class="ai-box-label">AI analysis</div><div class="ai-box-text" style="color:var(--down)">Error: ${e.message}</div></div>`;
  }
}

// ── HOLDINGS ──
window.addHolding = async function() {
  const ticker = document.getElementById('h-ticker').value.trim().toUpperCase();
  const shares = parseFloat(document.getElementById('h-shares').value);
  const cost   = parseFloat(document.getElementById('h-cost').value);
  const err    = document.getElementById('h-error');
  if (!ticker || isNaN(shares) || isNaN(cost)) { err.textContent = 'Fill in all fields.'; return; }
  if (holdings.find(h => h.ticker === ticker))  { err.textContent = 'Already in holdings.'; return; }
  err.textContent = '';
  holdings.push({ ticker, shares, cost });
  save();
  document.getElementById('h-ticker').value = '';
  document.getElementById('h-shares').value = '';
  document.getElementById('h-cost').value   = '';
  renderHoldings();
}

window.removeHolding = function(ticker) {
  holdings = holdings.filter(h => h.ticker !== ticker);
  save();
  renderHoldings();
}

window.loadAI = loadAI;

async function renderHoldings() {
  const el  = document.getElementById('holdings-list');
  const sum = document.getElementById('portfolio-summary');
  if (!holdings.length) { el.innerHTML = '<p class="loading">No holdings yet.</p>'; sum.innerHTML = ''; return; }
  if (FINNHUB_KEY === 'YOUR_FINNHUB_KEY') { el.innerHTML = '<p class="error-msg">Add your Finnhub API key to see live prices.</p>'; return; }
  el.innerHTML = '<p class="loading">Fetching prices...</p>';
  try {
    const quotes = await Promise.all(holdings.map(h => fetchQuote(h.ticker)));
    let totalValue = 0, totalCost = 0;
    const cards = holdings.map((h, i) => {
      const q = quotes[i];
      const price = q.c, dayChgPct = q.dp;
      const vsAvgPct = h.cost > 0 ? ((price - h.cost) / h.cost * 100) : 0;
      const value = price * h.shares, basis = h.cost * h.shares, gain = value - basis;
      totalValue += value; totalCost += basis;
      const dayCls = dayChgPct >= 0 ? 'up' : 'down';
      const gainColor = gain >= 0 ? 'var(--up)' : 'var(--down)';
      const vsColor   = vsAvgPct >= 0 ? 'var(--up)' : 'var(--down)';
      return `<div class="holding-card">
        <div class="holding-top">
          <div><div class="ticker-sym">${h.ticker}</div><div style="font-size:11px;color:var(--text-secondary)">${h.shares} sh · avg $${fmt(h.cost,2)}</div></div>
          <div><div style="font-size:15px;font-weight:500">${fmtMoney(price)}</div><span class="badge ${dayCls}" style="margin-top:3px">${fmtPct(dayChgPct)} today</span></div>
          <div><div style="font-size:14px;font-weight:500;color:${gainColor}">${gain>=0?'+':''}${fmtMoney(gain)}</div><div style="font-size:11px;color:${vsColor}">${fmtPct(vsAvgPct)} vs avg</div></div>
          <div><div style="font-size:14px;font-weight:500">${fmtMoney(value)}</div><div style="font-size:11px;color:var(--text-secondary)">basis ${fmtMoney(basis)}</div></div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
            <button class="remove-btn" onclick="removeHolding('${h.ticker}')">×</button>
            <button class="btn btn-ai" onclick="loadAI('${h.ticker}', ${h.cost})" style="font-size:11px;padding:4px 10px;">AI</button>
          </div>
        </div>
        <div id="ai-${h.ticker}"></div>
      </div>`;
    }).join('');
    const totalGain = totalValue - totalCost;
    const totalGainPct = totalCost > 0 ? (totalGain / totalCost * 100) : 0;
    el.innerHTML = cards;
    sum.innerHTML = `<div class="metric-grid">
      <div class="metric"><div class="metric-label">Portfolio value</div><div class="metric-value">${fmtMoney(totalValue)}</div></div>
      <div class="metric"><div class="metric-label">Total invested</div><div class="metric-value">${fmtMoney(totalCost)}</div></div>
      <div class="metric"><div class="metric-label">Total gain</div><div class="metric-value" style="color:${totalGain>=0?'var(--up)':'var(--down)'}">${totalGain>=0?'+':''}${fmtMoney(totalGain)}</div></div>
      <div class="metric"><div class="metric-label">Total return</div><div class="metric-value" style="color:${totalGainPct>=0?'var(--up)':'var(--down)'}">${fmtPct(totalGainPct)}</div></div>
    </div>`;
  } catch(e) {
    el.innerHTML = '<p class="error-msg">Could not fetch prices. Check your Finnhub key.</p>';
  }
}

// ── WATCHLIST ──
window.addToWatchlist = async function() {
  const ticker = document.getElementById('w-ticker').value.trim().toUpperCase();
  const err = document.getElementById('w-error');
  if (!ticker) { err.textContent = 'Enter a ticker.'; return; }
  if (watchlist.includes(ticker)) { err.textContent = 'Already on watchlist.'; return; }
  err.textContent = '';
  watchlist.push(ticker);
  save();
  document.getElementById('w-ticker').value = '';
  renderWatchlist();
}

window.removeFromWatchlist = function(ticker) {
  watchlist = watchlist.filter(t => t !== ticker);
  save();
  renderWatchlist();
}

async function renderWatchlist() {
  const el = document.getElementById('watchlist-list');
  if (!watchlist.length) { el.innerHTML = '<p class="loading">No tickers yet.</p>'; return; }
  if (FINNHUB_KEY === 'YOUR_FINNHUB_KEY') { el.innerHTML = '<p class="error-msg">Add your Finnhub API key to see live data.</p>'; return; }
  el.innerHTML = '<p class="loading">Fetching data...</p>';
  try {
    const [quotes, metricsList] = await Promise.all([
      Promise.all(watchlist.map(t => fetchQuote(t))),
      Promise.all(watchlist.map(t => fetchMetrics(t)))
    ]);
    el.innerHTML = watchlist.map((ticker, i) => {
      const q = quotes[i], m = metricsList[i].metric || {};
      const chg = q.dp || 0, cls = chg >= 0 ? 'up' : 'down';
      const inds = [
        { label: 'PE (TTM)',  val: fmt(m.peNormalizedAnnual, 1) },
        { label: 'Fwd PE',   val: fmt(m.forwardPE, 1) },
        { label: 'EPS (TTM)',val: m.epsTTM != null ? '$'+fmt(m.epsTTM,2) : '—' },
        { label: '52W High', val: m['52WeekHigh'] != null ? '$'+fmt(m['52WeekHigh'],2) : '—' },
        { label: '52W Low',  val: m['52WeekLow']  != null ? '$'+fmt(m['52WeekLow'],2)  : '—' },
        { label: 'Mkt Cap',  val: m.marketCapitalization ? '$'+fmt(m.marketCapitalization/1000,1)+'B' : '—' },
      ];
      return `<div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap;">
            <span class="ticker-sym">${ticker}</span>
            <span style="font-size:18px;font-weight:500">${fmtMoney(q.c)}</span>
            <span class="badge ${cls}">${fmtPct(chg)}</span>
            <span style="font-size:12px;color:var(--text-secondary)">H: ${fmtMoney(q.h)} · L: ${fmtMoney(q.l)}</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <button class="btn btn-ai" onclick="loadAI('${ticker}', null)" style="font-size:12px;padding:5px 12px;">AI analysis</button>
            <button class="btn" onclick="loadNews('${ticker}')" style="font-size:12px;padding:5px 12px;">News</button>
            <button class="remove-btn" onclick="removeFromWatchlist('${ticker}')">×</button>
          </div>
        </div>
        <div class="indicator-grid">${inds.map(ind=>`<div class="ind-box"><div class="ind-label">${ind.label}</div><div class="ind-val">${ind.val}</div></div>`).join('')}</div>
        <div id="ai-${ticker}"></div>
        <div id="news-${ticker}"></div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<p class="error-msg">Could not fetch data. Check your Finnhub key.</p>';
  }
}

window.loadNews = async function(ticker) {
  const el = document.getElementById('news-'+ticker);
  el.innerHTML = '<p class="loading" style="margin-top:10px">Loading news...</p>';
  try {
    const news = await fetchNews(ticker);
    if (!news || !news.length) { el.innerHTML = '<p class="loading" style="margin-top:10px">No recent news.</p>'; return; }
    el.innerHTML = '<div class="divider"></div>' + news.slice(0,5).map(n => {
      const d = new Date(n.datetime*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return `<div class="news-item"><div class="news-headline"><a href="${n.url}" target="_blank">${n.headline}</a></div><div class="news-meta">${n.source} · ${d}</div></div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<p class="error-msg" style="margin-top:8px">Could not load news.</p>';
  }
}

// ── PAYCHECK ──
function buildAllocSliders() {
  document.getElementById('alloc-sliders').innerHTML = ALLOC_CATS.map((c,i) =>
    `<div class="slider-row">
      <label>${c.label}</label>
      <input type="range" min="0" max="100" step="1" value="${allocPcts[i]}" oninput="allocPcts[${i}]=+this.value;updateAlloc()" />
      <span class="pct-out" id="pct-out-${i}">${allocPcts[i]}%</span>
    </div>`).join('');
}

window.updateAlloc = function() {
  const pay   = parseFloat(document.getElementById('paycheck-amt').value) || 0;
  const total = allocPcts.reduce((a,b)=>a+b,0);
  ALLOC_CATS.forEach((_,i) => { const el = document.getElementById('pct-out-'+i); if (el) el.textContent = allocPcts[i]+'%'; });
  document.getElementById('alloc-bars').innerHTML = ALLOC_CATS.map((c,i) =>
    `<div class="alloc-row">
      <div class="alloc-label">${c.label}</div>
      <div class="alloc-bar-wrap"><div class="alloc-bar" style="width:${allocPcts[i]}%;background:${c.color}"></div></div>
      <div class="alloc-pct">${allocPcts[i]}%</div>
      <div class="alloc-amt">${pay>0 ? fmtMoney(pay*allocPcts[i]/100) : '—'}</div>
    </div>`).join('');
  const remaining = 100 - total;
  document.getElementById('alloc-remaining').innerHTML =
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;font-size:13px;">
      <span style="color:var(--text-secondary)">Allocated</span>
      <span style="font-weight:500;color:${total>100?'var(--down)':total===100?'var(--up)':'var(--text)'}">${total}%${total>100?' (over by '+(total-100)+'%)':''}</span>
    </div>
    ${pay>0?`<div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;padding-bottom:4px;">
      <span style="color:var(--text-secondary)">Unallocated</span>
      <span style="font-weight:500">${fmtMoney(pay*Math.max(0,remaining)/100)}</span>
    </div>`:''}`;
}

buildAllocSliders();
window.updateAlloc();
renderHoldings();
renderWatchlist();
</script>
</body>
</html>
